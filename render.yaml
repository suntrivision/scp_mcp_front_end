# Render Web Service — Node API (Tally MCP + frePPle routes in server/index.mjs)
# https://render.com/docs/yaml-spec
#
# Vendored tally-prime (dist + pull) is in ./tally-prime; see server/index.mjs.
# Set TALLY_HOST in the dashboard if your Tally XML server is not at the default IP below.

services:
  - type: web
    name: tally-mcp-api
    runtime: node
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: TALLY_PORT
        value: "9000"
